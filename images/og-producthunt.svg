<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" rx="24" fill="url(#bgGrad)"/>

  <!-- Border -->
  <rect width="240" height="240" rx="24" fill="none" stroke="#30363d" stroke-width="1.5"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="240" height="3" rx="2" fill="url(#blueGrad)"/>

  <!-- Bookmark icon centered -->
  <g transform="translate(70, 40)">
    <path d="M10 0 L90 0 L90 130 L50 105 L10 130 Z" fill="url(#blueGrad)" filter="url(#glow)"/>
    <circle cx="90" cy="0" r="16" fill="white" opacity="0.95"/>
  </g>

  <!-- Name -->
  <text x="120" y="198" font-family="'Segoe UI', -apple-system, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-0.5">Dev Checkpoint</text>

  <!-- Tagline -->
  <text x="120" y="220" font-family="'Segoe UI', -apple-system, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Save context. Resume instantly.</text>
</svg>
